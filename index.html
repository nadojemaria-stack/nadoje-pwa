<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>#надожехудожка</title>

  <!-- PWA manifest — лежит рядом на том же поддомене -->
  <link rel="manifest" href="/manifest.json">

  <!-- iOS поддержка -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="надожехудожка">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- Theme color для Android Chrome -->
  <meta name="theme-color" content="#ffffff">

  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: sans-serif;
      color: #333;
    }
    p { text-align: center; opacity: 0.5; font-size: 14px; }
  </style>
</head>
<body>
  <p>Загрузка...</p>

  <script>
    // Регистрируем Service Worker (он лежит на том же поддомене)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => {
          // SW зарегистрирован — редиректим на основной сайт
          window.location.replace('https://nadojehudozka.ru/personal');
        })
        .catch((err) => {
          // Даже если SW не встал — всё равно редиректим
          console.warn('SW registration failed:', err);
          window.location.replace('https://nadojehudozka.ru/personal');
        });
    } else {
      // Браузер без SW — просто редирект
      window.location.replace('https://nadojehudozka.ru/personal');
    }
  </script>
</body>
</html>
